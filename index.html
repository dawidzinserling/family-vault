    /id=([a-zA-Z0-9_-]+)/
  ];

    if (match) return match[1];
  }
  return null;
};

const generatePerceptualHash = (imageUrl) => {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'Anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 32;
      canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, 32, 32);
      const imageData = ctx.getImageData(0, 0, 32, 32);
      const data = imageData.data;
      let hash = '';
      for (let i = 0; i < data.length; i += 4) {
        const gray = (data[i] + data[i+1] + data[i+2]) / 3;
        hash += gray > 128 ? '1' : '0';
      }
      resolve(hash);
    };
    img.onerror = reject;
    img.src = imageUrl + '?t=' + Date.now();
  });
};

const hammingDistance = (hash1, hash2) => {
  let distance = 0;
  for (let i = 0; i < hash1.length; i++) {
    if (hash1[i] !== hash2[i]) distance++;
  }
  return distance;
};

const findDuplicatesAndSimilar = (images, similarityThreshold = 10) => {
  const groups = [];
  const processed = new Set();
  
  for (let i = 0; i < images.length; i++) {
    if (processed.has(i)) continue;
    
    const group = {
      master: images[i],
      duplicates: [],
      similar: []
    };
    
    for (let j = i + 1; j < images.length; j++) {
      if (processed.has(j)) continue;
      const distance = hammingDistance(images[i].hash, images[j].hash);
      if (distance === 0) {
        group.duplicates.push(images[j]);
        processed.add(j);
      } else if (distance <= similarityThreshold) {
        group.similar.push(images[j]);
      }
    }
    
    if (group.duplicates.length > 0 || group.similar.length > 0) {
      groups.push(group);
      processed.add(i);
    }
  }
  return groups;
};

const deleteGroupFiles = async (groupIndex, type) => {
  const group = currentDuplicateGroups[groupIndex];
  let filesToDelete = [];
  let typeName = '';
  
  if (type === 'duplicates') {
    filesToDelete = group.duplicates;
    typeName = 'duplicate';
  } else if (type === 'similar') {
    filesToDelete = group.similar;
    typeName = 'similar';
  }
  
  if (filesToDelete.length === 0) return;
  
  if (confirm(`Delete ${filesToDelete.length} ${typeName} images? This action cannot be undone.`)) {
    showMessage(`Deleting ${filesToDelete.length} files...`, 'info');
    const fileIds = filesToDelete.map(f => f.id);
    const results = await deleteDriveFiles(fileIds);
    const successCount = results.filter(r => r.success).length;
    
    if (successCount > 0) {
      showMessage(`✅ Deleted ${successCount} files successfully!`, 'success');
      closeDeleteModal();
      setTimeout(() => scanAndDeleteDuplicates(currentFolder), 1500);
    } else {
      showMessage('❌ Failed to delete files', 'error');

const deleteAllDuplicatesFromGroups = async () => {
  const allDuplicateIds = [];
  for (const group of currentDuplicateGroups) {
    for (const dup of group.duplicates) {

  if (allDuplicateIds.length === 0) {

    showMessage(`Deleting ${allDuplicateIds.length} files...`, 'info');

// ============ SUPABASE FUNCTIONS ============
const supabaseFetch = async (endpoint, method, body) => {
  const response = await fetch(`${SB_URL}/rest/v1/${endpoint}`, {
    method: method,
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    },
    body: body ? JSON.stringify(body) : undefined
  });
  return response;
};

const loadFoldersFromCloud = async () => {
  try {
    const response = await supabaseFetch('folders?select=*&order=created_at.desc', 'GET');
    if (response.ok) {
      const data = await response.json();
      folders = data.map(f => ({
        id: f.id,
        name: f.name,
        driveLink: f.drive_link,
        createdBy: f.created_by,
        createdByPhone: f.created_by_phone,
        createdAt: f.created_at
      }));
      return folders;
    }
  } catch (error) {
    console.error('Error loading folders:', error);
  }
  return [];
};

const saveFolderToCloud = async (folder) => {
  try {
    const response = await supabaseFetch('folders', 'POST', {
      id: folder.id,
      name: folder.name,
      drive_link: folder.driveLink,
      created_by: folder.createdBy,
      created_by_phone: folder.createdByPhone,
      created_at: folder.createdAt
    });
    return response.ok;
  } catch (error) { return false; }
};

const updateFolderInCloud = async (folder) => {
  try {
    const response = await supabaseFetch(`folders?id=eq.${folder.id}`, 'PATCH', {
      drive_link: folder.driveLink
    });
    return response.ok;
  } catch (error) { return false; }
};

const deleteFolderFromCloud = async (folderId) => {
  try {
    const response = await supabaseFetch(`folders?id=eq.${folderId}`, 'DELETE');
    return response.ok;
  } catch (error) { return false; }
};

const getUsers = async () => {
  try {
    const response = await supabaseFetch('users?select=*', 'GET');
    if (response.ok) return response.json();
  } catch (e) {}
  return [];
};

const addUser = async (username, phone, password, securityQuestion, securityAnswer) => {
  const response = await supabaseFetch('users', 'POST', {
    username,
    phone,
    password,
    role: 'user',
    security_question: securityQuestion,
    security_answer: securityAnswer.toLowerCase(),
    created_at: new Date().toISOString()
  });
  return response.ok;
};

const updateUser = async (username, updates) => {
  const response = await supabaseFetch(`users?username=eq.${encodeURIComponent(username)}`, 'PATCH', updates);
  return response.ok;
};

const deleteUser = async (username) => {
  if (ADMINS.some(a => a.username === username)) {
    showMessage('Cannot delete admin user', 'error');
    return false;
  }
  const response = await supabaseFetch(`users?username=eq.${encodeURIComponent(username)}`, 'DELETE');
  return response.ok;
};

// ============ FOLDER FUNCTIONS ============
const getFolders = () => folders;

const canDeleteFolder = (folder) =>
  currentUser.role === 'admin' || folder.createdBy === currentUser.username;

const createFolder = async (folderName, driveLink) => {
  if (folders.find(f => f.name === folderName)) {
    showMessage('Folder already exists!', 'error');
    return false;
  }
  const newFolder = {
    id: Date.now(),
    name: folderName,
    driveLink: driveLink || '',
    createdBy: currentUser.username,
    createdByPhone: currentUser.phone,
    createdAt: new Date().toISOString()
  };
  const saved = await saveFolderToCloud(newFolder);
  if (saved) {
    folders.push(newFolder);
    showMessage(`Folder "${folderName}" created!`, 'success');
    return true;
  } else {
    showMessage('Error saving folder', 'error');
    return false;
  }
};

const updateFolderLink = async (folderId, driveLink) => {
  const folder = folders.find(f => f.id === folderId);
  if (folder) {
    folder.driveLink = driveLink;
    const updated = await updateFolderInCloud(folder);
    if (updated) {
      showMessage('Link updated!', 'success');
      renderApp();
    } else {
      showMessage('Error updating link', 'error');
    }
  }
};

const deleteFolder = async (folderId) => {
  const folder = folders.find(f => f.id === folderId);
  if (!folder) return;
  if (!canDeleteFolder(folder)) {
    showMessage('You cannot delete this folder. Only the creator can delete it.', 'error');
    return;
  }
  if (confirm(`Delete folder "${folder.name}"?`)) {
    const deleted = await deleteFolderFromCloud(folderId);
    if (deleted) {
      folders = folders.filter(f => f.id !== folderId);
      showMessage('Folder deleted!', 'success');
      if (currentFolder === folderId) currentFolder = null;
      renderApp();
    } else {
      showMessage('Error deleting folder', 'error');
    }
  }
};

const openCloudFolder = (driveLink, folderName) => {
  if (!driveLink) {
    showMessage('No Google Drive link set', 'error');
    return;
  }
  const fileId = driveLink.match(/\/d\/(.+?)\//)?.[1] || driveLink.match(/folders\/(.+?)(?:\?|$)/)?.[1];
  const url = fileId ? `https://drive.google.com/open?id=${fileId}` : driveLink;
  window.open(url, '_blank');
  showMessage(`Opening ${folderName} in Google Drive...`, 'info');
};

  const folderName = prompt('Enter folder name:');

  await createFolder(folderName, '');
  const link = prompt(`Now go to Google Drive, create a folder named "${folderName}", then paste the folder link here:`);

    if (newFolder) await updateFolderLink(newFolder.id, link.trim());

  renderApp();
};

const updateProfile = async () => {
  const newUsername = document.getElementById('editUsername')?.value.trim();
  const newPhone = document.getElementById('editPhone')?.value.trim();
  if (!newUsername || newUsername.length < 3) { showMessage('Username must be at least 3 characters', 'error'); return; }
  if (!newPhone || newPhone.length < 10) { showMessage('Valid phone number required', 'error'); return; }
  if (newUsername !== currentUser.username) {
    const users = await getUsers();
    if (users.find(u => u.username === newUsername)) { showMessage('Username already taken', 'error'); return; }
  }
  const success = await updateUser(currentUser.username, { username: newUsername, phone: newPhone });
  if (success) {
    currentUser.username = newUsername;
    currentUser.phone = newPhone;
    localStorage.setItem('family_vault_user', newUsername);
    showMessage('Profile updated!', 'success');
    renderApp();
  } else {
    showMessage('Error updating profile', 'error');
  }
};

const changePassword = async () => {
  const currentPw = document.getElementById('currentPassword')?.value.trim();
  const newPw = document.getElementById('newPassword')?.value.trim();
  const confirmPw = document.getElementById('confirmPassword')?.value.trim();
  if (!currentPw || !newPw) { showMessage('Please fill all fields', 'error'); return; }
  if (newPw.length < 6) { showMessage('New password must be at least 6 characters', 'error'); return; }
  if (newPw !== confirmPw) { showMessage('New passwords do not match', 'error'); return; }
  const users = await getUsers();
  const user = users.find(u => u.username === currentUser.username);
  if (!user || user.password !== currentPw) { showMessage('Current password is incorrect', 'error'); return; }
  const success = await updateUser(currentUser.username, { password: newPw });
  if (success) {
    currentUser.password = newPw;
    showMessage('Password updated!', 'success');
    document.getElementById('currentPassword').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('confirmPassword').value = '';
  } else {
    showMessage('Error updating password', 'error');
  }
};

const togglePassword = (inputId) => {
  const input = document.getElementById(inputId);
  if (input) input.type = input.type === 'password' ? 'text' : 'password';
};

  const regularUsers = users.filter(u => u.role !== 'admin');
  container.innerHTML = `
    <div class="sh">
      <div class="sh-t">👑 Admin Panel</div>
      <div class="sh-s">Manage Users</div>
    </div>
    <div class="card">
      <div class="ctitle">👥 User Management</div>
      ${regularUsers.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--tx3)">No users yet</div>' : ''}
      ${regularUsers.map(user => `
        <div style="background:var(--s2);border-radius:12px;padding:12px;margin-bottom:10px">
          <div style="font-weight:700">${escapeHtml(user.username)}</div>
          <div style="font-size:11px;color:var(--tx3);margin-bottom:8px">📞 ${escapeHtml(user.phone)}</div>
          <button class="btn btn-sm btn-d" onclick="deleteUserAccount('${escapeHtml(user.username)}')">Delete User</button>
        </div>
      `).join('')}
    </div>
  `;
};

const deleteUserAccount = async (username) => {
  if (!confirm(`Delete user "${username}"?`)) return;
  const success = await deleteUser(username);
  if (success) {
    showMessage(`User "${username}" deleted!`, 'success');
    renderAdminPanel();
  } else {
    showMessage('Error deleting user', 'error');
  }
};

// ============ RENDER: HOME ============
const renderHome = () => {
  const container = document.getElementById('homeContainer');
  if (!container) return;
  const visibleFolders = getFolders();
  container.innerHTML = `
    <div class="sh"><div><div class="sh-t">👋 Welcome, ${escapeHtml(currentUser.username)}</div><div class="sh-s">Family Google Drive Organizer</div></div></div>
    <div class="card" style="text-align:center;background:linear-gradient(135deg, var(--s1), var(--s2))">
      <div style="font-size:48px;margin-bottom:12px">☁️📁</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Family Google Drive</div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:16px">Organize and share folders with your family</div>
      <button class="btn btn-p btn-w" onclick="navigateTo('folders')">Browse All Folders</button>
    </div>
    <div class="card">
      <div class="ctitle">📊 Family Stats</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center">
        <div>
          <div style="font-size:32px;font-weight:800;color:var(--a1)">${visibleFolders.length}</div>
          <div style="font-size:11px;color:var(--tx2)">Total Folders</div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">💡 How It Works</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.6">
        📁 Anyone can create folders and add Google Drive links<br><br>
        👤 You can delete folders you created<br><br>
        👑 Admin can delete any folder<br><br>
        ☁️ All files are stored in your own Google Drive<br><br>
        🗑️ Folder owners can scan and delete duplicate images before sharing<br><br>
        💬 Tap the WhatsApp button in Contacts to message family members!
      </div>
    </div>
  `;
};

// ============ FORGOT PASSWORD ============
const openForgotModal = () => {
  document.getElementById('forgotModalOverlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'forgotModalOverlay';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-content" id="forgotModalBox">
      <div class="modal-title">🔐 Forgot Password</div>
      <div class="modal-sub">Enter your registered phone number and we'll help you recover your account.</div>
      <input type="tel" id="forgotPhone" placeholder="e.g. 0821234567" autocomplete="off" style="margin-bottom:6px">
      <div id="forgotInlineMsg"></div>
      <div class="modal-buttons">
        <button class="btn btn-p" onclick="checkUserForRecovery()">Next ›</button>
        <button class="btn btn-gh" onclick="closeForgotModal()">Cancel</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeForgotModal(); });
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('forgotPhone')?.focus(), 100);
};

const closeForgotModal = () => {
  document.getElementById('forgotModalOverlay')?.remove();
  forgotPhoneNumber = null;
};

const checkUserForRecovery = async () => {
  const phone = document.getElementById('forgotPhone')?.value.trim();
  const msgEl = document.getElementById('forgotInlineMsg');
  if (!phone) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">Please enter your phone number.</div>`; return; }
  if (msgEl) msgEl.innerHTML = `<div class="al al-i">Checking...</div>`;
  const users = await getUsers();
  const user = users.find(u => u.phone === phone);
  if (!user) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">No account found with this phone number.</div>`; return; }
  forgotPhoneNumber = phone;
  closeForgotModal();
  openSecurityModal(user.security_question);
};

const openSecurityModal = (question) => {
  document.getElementById('securityModalOverlay')?.remove();
  const overlay = document.createElement('div');
  overlay.id = 'securityModalOverlay';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-content" id="securityModalBox">
      <div class="modal-title">🛡️ Security Question</div>
      <div class="modal-sub">Answer the question below to recover your account.</div>
      <div style="background:var(--bg3);border:1px solid var(--bd2);border-radius:var(--radius2);padding:12px 14px;font-size:13px;color:var(--a1);font-weight:600;margin-bottom:14px;line-height:1.5">
        ${escapeHtml(question || 'Security question not set.')}
      </div>
      <input type="text" id="securityAnswer" placeholder="Your answer" autocomplete="off" style="margin-bottom:6px">
      <div id="securityInlineMsg"></div>
      <div class="modal-buttons">
        <button class="btn btn-p" onclick="verifySecurityAnswer()">Verify ›</button>
        <button class="btn btn-gh" onclick="closeSecurityModal()">Cancel</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSecurityModal(); });
  document.body.appendChild(overlay);
  setTimeout(() => document.getElementById('securityAnswer')?.focus(), 100);
};

const closeSecurityModal = () => {
  document.getElementById('securityModalOverlay')?.remove();
  forgotPhoneNumber = null;
};

const verifySecurityAnswer = async () => {
  const answer = document.getElementById('securityAnswer')?.value.trim().toLowerCase();
  const msgEl = document.getElementById('securityInlineMsg');
  if (!answer) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">Please enter your answer.</div>`; return; }
  if (msgEl) msgEl.innerHTML = `<div class="al al-i">Verifying...</div>`;
  const users = await getUsers();
  const user = users.find(u => u.phone === forgotPhoneNumber);
  if (!user) { if (msgEl) msgEl.innerHTML = `<div class="al al-e">Something went wrong. Please try again.</div>`; return; }
  if (user.security_answer === answer) {
    closeSecurityModal();
    setTimeout(() => {
      alert(`✅ Identity Verified!\n\nYour account details:\n\nUsername: ${user.username}\nPassword: ${user.password}\n\nPlease save this information securely.`);
    }, 200);
  } else {
    if (msgEl) msgEl.innerHTML = `<div class="al al-e">Incorrect answer. Please try again.</div>`;
    const answerInput = document.getElementById('securityAnswer');
    if (answerInput) { answerInput.value = ''; answerInput.focus(); }
  }
};

// ============ AUTHENTICATION ============
const doLogin = async () => {
  const username = document.getElementById('loginUsername')?.value.trim();
  const password = document.getElementById('loginPassword')?.value.trim();
  const remember = document.getElementById('rememberMe')?.checked || false;
  if (!username || !password) { showMessage('Enter username and password', 'error'); return; }

  const admin = ADMINS.find(a => a.username === username && a.password === password);
  if (admin) {
    currentUser = { ...admin, role: 'admin' };
    if (remember) localStorage.setItem('family_vault_user', username);
    await loadFoldersFromCloud();
    renderApp();
    return;
  }

  const users = await getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (user) {
    currentUser = user;
    if (remember) localStorage.setItem('family_vault_user', username);
    await loadFoldersFromCloud();
    renderApp();
    return;
  }

  showMessage('Invalid username or password', 'error');
};

const doSignup = async () => {
  const username = document.getElementById('signupUsername')?.value.trim();
  const phone = document.getElementById('signupPhone')?.value.trim();
  const password = document.getElementById('signupPassword')?.value.trim();
  const confirm = document.getElementById('signupConfirm')?.value.trim();
  const securityQuestion = document.getElementById('securityQuestion')?.value;
  const securityAnswer = document.getElementById('securityAnswerInput')?.value.trim();

  if (!username || username.length < 3) { showMessage('Username: min 3 characters', 'error'); return; }
  if (!phone || phone.length < 10) { showMessage('Valid phone number required', 'error'); return; }
  if (password.length < 6) { showMessage('Password: min 6 characters', 'error'); return; }
  if (password !== confirm) { showMessage('Passwords do not match', 'error'); return; }
  if (!securityQuestion) { showMessage('Please select a security question', 'error'); return; }
  if (!securityAnswer) { showMessage('Please enter an answer to your security question', 'error'); return; }
  if (ADMINS.some(a => a.username === username)) { showMessage('Username not available', 'error'); return; }

  const users = await getUsers();
  if (users.find(u => u.username === username)) { showMessage('Username taken', 'error'); return; }
  if (users.find(u => u.phone === phone)) { showMessage('Phone number already registered', 'error'); return; }

  const success = await addUser(username, phone, password, securityQuestion, securityAnswer);
  if (success) { showMessage('Account created! Please sign in.', 'success'); showLogin(); }
  else showMessage('Error creating account', 'error');
};

const showLogin = () => {
  const savedUser = localStorage.getItem('family_vault_user');
  document.getElementById('app').innerHTML = `
    <div class="login-container">
      <div class="login-header">
        <div class="icon">☁️</div>
        <h1>Family Vault</h1>
        <p>Google Drive organizer for family memories</p>
      </div>

      <div id="loginForm">
        <div class="card">
          <div class="ctitle">Sign In</div>
          <input type="text" id="loginUsername" placeholder="Username" value="${escapeHtml(savedUser || '')}">
          <div class="pw-w">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="eye-btn" onclick="togglePassword('loginPassword')">👁️</button>
          </div>
          <div class="check-row">
            <input type="checkbox" id="rememberMe" ${savedUser ? 'checked' : ''}>
            <label for="rememberMe">Remember me</label>
          </div>
          <div style="text-align:right;margin-bottom:16px">
            <span class="lnk" onclick="openForgotModal()">Forgot password?</span>
          </div>
          <button class="btn btn-p btn-w" onclick="doLogin()">Sign In</button>
          <button class="btn btn-gh btn-w" style="margin-top:12px" onclick="showSignup()">Create Account</button>
        </div>
      </div>

      <div id="signupForm" style="display:none">
        <div class="card">
          <div class="ctitle">Create Account</div>
          <input type="text" id="signupUsername" placeholder="Username (min 3 chars)">
          <input type="tel" id="signupPhone" placeholder="Phone number">
          <div class="pw-w">
            <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
            <button class="eye-btn" onclick="togglePassword('signupPassword')">👁️</button>
          </div>
          <div class="pw-w">
            <input type="password" id="signupConfirm" placeholder="Confirm password">
            <button class="eye-btn" onclick="togglePassword('signupConfirm')">👁️</button>
          </div>
          <div class="ctitle" style="margin-top:16px">🔐 Security Question</div>
          <select id="securityQuestion" class="question-select">
            <option value="">Select a security question...</option>
            ${SECURITY_QUESTIONS.map(q => `<option value="${escapeHtml(q)}">${escapeHtml(q)}</option>`).join('')}
          </select>
          <input type="text" id="securityAnswerInput" placeholder="Your answer">
          <button class="btn btn-p btn-w" onclick="doSignup()">Create Account</button>
          <button class="btn btn-gh btn-w" style="margin-top:12px" onclick="showSignupBack()">Back to Sign In</button>
        </div>
      </div>

      <div id="messageContainer"></div>
    </div>
  `;
};

const showSignup = () => {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
};

const showSignupBack = () => {
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
};

// ============ MAIN APP RENDER ============
const renderApp = () => {
  const isAdmin = currentUser?.role === 'admin';
  document.getElementById('app').innerHTML = `
    <div class="tbw">
      <div class="tb">
        <div class="logo">☁️ Family Vault</div>
        <div class="tb-r">
          <div class="av">${getInitial(currentUser.username)}</div>
          <span class="tb-name">${escapeHtml(currentUser.username)}</span>
          <button class="menu-btn" onclick="toggleMenu()">☰</button>
        </div>
      </div>
    </div>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="menuPanel" class="menu-panel">
      <div class="menu-header">
        <span style="font-weight:700">Menu</span>
        <button class="close-btn" onclick="toggleMenu()">✕</button>
      </div>
      <div class="menu-items">
        <div class="menu-item ${currentView === 'home' ? 'active' : ''}" onclick="navigateTo('home')">🏠 Home</div>
        <div class="menu-item ${currentView === 'folders' ? 'active' : ''}" onclick="navigateTo('folders')">📁 Folders</div>
        <div class="menu-item ${currentView === 'contacts' ? 'active' : ''}" onclick="navigateTo('contacts')">👥 Contacts</div>
        <div class="menu-item ${currentView === 'settings' ? 'active' : ''}" onclick="navigateTo('settings')">⚙️ Settings</div>
        ${isAdmin ? `<div class="menu-item ${currentView === 'admin' ? 'active' : ''}" onclick="navigateTo('admin')">👑 Admin Panel</div>` : ''}
        <div class="menu-item signout-item" onclick="signOut()">🚪 Sign Out</div>
      </div>
      <div class="menu-footer">
        <div>Logged in as: ${escapeHtml(currentUser.username)}</div>
        <div style="margin-top:4px;font-size:10px">📞 ${escapeHtml(currentUser.phone)}</div>
      </div>
    </div>

    <div class="scr">
      <div id="messageContainer"></div>
      <div id="homeContainer"        class="tab-pane ${currentView === 'home'     ? 'show' : ''}"></div>
      <div id="folderViewContainer"  class="tab-pane ${currentView === 'folders'  ? 'show' : ''}"></div>
      <div id="contactsContainer"    class="tab-pane ${currentView === 'contacts' ? 'show' : ''}"></div>
      <div id="settingsContainer"    class="tab-pane ${currentView === 'settings' ? 'show' : ''}"></div>
      ${isAdmin ? `<div id="adminContainer" class="tab-pane ${currentView === 'admin' ? 'show' : ''}"></div>` : ''}
    </div>

    <div class="bottom-nav">
      <button class="home-btn" onclick="navigateTo('home')">🏠 Home</button>
    </div>
  `;

  if (currentView === 'home') renderHome();
  if (currentView === 'folders') renderFolderView();
  if (currentView === 'contacts') renderContacts();
  if (currentView === 'settings') renderSettings();
  if (isAdmin && currentView === 'admin') renderAdminPanel();
};

// ============ EXPOSE GLOBAL FUNCTIONS ============
window.doLogin = doLogin;
window.doSignup = doSignup;
window.showLogin = showLogin;
window.showSignup = showSignup;
window.showSignupBack = showSignupBack;
window.toggleMenu = toggleMenu;
window.navigateTo = navigateTo;
window.signOut = signOut;
window.openForgotModal = openForgotModal;
window.closeForgotModal = closeForgotModal;
window.checkUserForRecovery = checkUserForRecovery;
window.openSecurityModal = openSecurityModal;
window.closeSecurityModal = closeSecurityModal;
window.verifySecurityAnswer = verifySecurityAnswer;
window.createFolderInDrive = createFolderInDrive;
window.showEditLinkModal = showEditLinkModal;
window.saveDriveLink = saveDriveLink;
window.deleteFolder = deleteFolder;
window.closeModal = closeModal;
window.openCloudFolder = openCloudFolder;
window.openFolderActions = openFolderActions;
window.goBackToFolders = goBackToFolders;
window.changePassword = changePassword;
window.togglePassword = togglePassword;
window.deleteUserAccount = deleteUserAccount;
window.openWhatsApp = openWhatsApp;
window.updateProfile = updateProfile;
window.scanAndDeleteDuplicates = scanAndDeleteDuplicates;
window.deleteGroupFiles = deleteGroupFiles;
window.keepGroupFiles = keepGroupFiles;
window.deleteAllDuplicatesFromGroups = deleteAllDuplicatesFromGroups;
window.closeDeleteModal = closeDeleteModal;

// ============ INITIALIZE ============
window.onload = async () => {
  const savedUser = localStorage.getItem('family_vault_user');
  if (savedUser) {
    const users = await getUsers();
    const user = users.find(u => u.username === savedUser);
    if (user) {
      currentUser = user;
      await loadFoldersFromCloud();
      renderApp();
      return;
    }
  }
  showLogin();
};
</script>
