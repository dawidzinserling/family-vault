const escapeHtml = (t) => t ? String(t).replace(/[&<>]/g, (m) => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m])) : '';

// ============ SUPABASE FETCH ============
const supabaseFetch = async (endpoint, method, body) => {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${endpoint}`, {
      method,
      headers: { 
        'apikey': SB_KEY, 
        'Authorization': `Bearer ${SB_KEY}`, 
        'Content-Type': 'application/json', 
        'Prefer': method === 'POST' ? 'return=representation' : ''
      },
      body: body ? JSON.stringify(body) : undefined
    });
    return res;
  } catch(e) {
    console.error('Supabase fetch error:', e);
    return { ok: false, error: e };
  }
};

// ============ IMAGE COMPRESSION ============
const compressImage = (file, maxSizeKB = 150) => {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let width = img.width;
        let height = img.height;
        const maxDimension = 1000;
        if (width > height && width > maxDimension) {
          height = (height * maxDimension) / width;
          width = maxDimension;
        } else if (height > maxDimension) {
          width = (width * maxDimension) / height;
          height = maxDimension;
        }
        canvas.width = width;
        canvas.height = height;
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob((blob) => {
          resolve(blob);
        }, 'image/jpeg', 0.8);
      };
      img.onerror = reject;
    };
    reader.onerror = reject;
  });
};

// ============ FOLDERS SYSTEM ============
const loadFoldersFromCloud = async () => {
  try {
    const res = await supabaseFetch('folders?select=*&order=created_at.desc', 'GET');

const saveRecipeToDatabase = async (recipeData) => {
  try {
    const response = await fetch(`${SB_URL}/rest/v1/recipes`, {
      method: 'POST',
      headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify(recipeData)
    });
    if(response.ok) {
      const result = await response.json();
      return { success: true, data: result };
    }
    return { success: false, error: await response.text() };
  } catch(e) {
    return { success: false, error: e.message };
  }
};

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
      <div><div style="font-size:24px;font-weight:800">🍳 Family Recipes</div><div style="font-size:12px;color:var(--tx2)">${recipes.length} cherished recipes</div></div>
      <div class="add-recipe-options">
        <button class="btn btn-p btn-sm" onclick="openManualRecipeForm()">✍️ Manual</button>
        <button class="btn btn-gh btn-sm" onclick="capturePhoto()">📸 Camera</button>
        <button class="btn btn-gh btn-sm" onclick="uploadFromGallery()">🖼️ Gallery</button>
      </div>
    </div>
  `;
  if(recipes.length === 0) {
    html += `<div class="card" style="text-align:center;padding:40px">📖 No recipes yet — add your first family recipe!</div>`;
  } else {
    recipes.forEach(recipe => {
      html += `
        <div class="recipe-card" onclick="viewRecipeDetail(${recipe.id})">
          ${recipe.image_url ? `<img src="${recipe.image_url}" class="recipe-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%236E9C9C%22%3E%3Cpath d=%22M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 13c-2.33 0-4.31-1.46-5.11-3.5h10.22c-.8 2.04-2.78 3.5-5.11 3.5z%22/%3E%3C/svg%3E'">` : `<div class="recipe-image" style="display:flex;align-items:center;justify-content:center;font-size:32px;background:var(--bg3);border-radius:16px">🍲</div>`}
          <div class="recipe-info">
            <div class="recipe-name">${escapeHtml(recipe.name)}</div>
            <div class="recipe-meta">
              <span>⏱️ Prep: ${recipe.prep_time || '?'} min</span>
              <span>👥 ${recipe.servings || '?'} serves</span>
              <span>📊 ${recipe.difficulty || 'Medium'}</span>
            </div>
            <div style="font-size:12px;color:var(--tx2);margin-top:6px">👤 ${escapeHtml(recipe.added_by)}</div>
          </div>
        </div>
      `;
    });
  }
  container.innerHTML = html;
};

const viewRecipeDetail = (id) => {
  const recipe = recipes.find(r => r.id === id);
  if(!recipe) return;
  const ingredientsList = recipe.ingredients ? recipe.ingredients.split('\n').filter(l => l.trim()) : [];
  const stepsList = recipe.instructions ? recipe.instructions.split('\n').filter(l => l.trim()) : [];
  const modal = document.createElement('div'); modal.className = 'modal-overlay';
  modal.innerHTML = `
    <div class="modal-content" style="max-width:550px">
      <div class="modal-title">🍽️ ${escapeHtml(recipe.name)}</div>
      ${recipe.image_url ? `<img src="${recipe.image_url}" style="width:100%;border-radius:16px;margin-bottom:16px;max-height:250px;object-fit:cover" onerror="this.style.display='none'">` : ''}
      <div style="background:var(--bg3);border-radius:16px;padding:12px;margin:12px 0;display:flex;flex-wrap:wrap;gap:12px">
        <span>⏱️ Prep: ${recipe.prep_time || '—'} min</span>
        ${recipe.cook_time && recipe.cook_time !== '—' ? `<span>🔥 Cook: ${recipe.cook_time} min</span>` : ''}
        <span>👥 Serves: ${recipe.servings || '—'}</span>
        <span>📊 ${recipe.difficulty || 'Medium'}</span>
      </div>
      <div><strong style="color:var(--a1)">📋 INGREDIENTS</strong></div>
      <ul style="background:var(--bg2);border-radius:16px;padding:14px 20px;margin:8px 0">
        ${ingredientsList.map(i => `<li style="margin-bottom:6px">✓ ${escapeHtml(i)}</li>`).join('')}
      </ul>
      <div><strong style="color:var(--a1)">👩‍🍳 METHOD</strong></div>
      <ol style="padding-left:20px;margin:12px 0 20px 0">
        ${stepsList.map((step,idx) => `<li style="margin-bottom:10px;line-height:1.4"><strong>${idx+1}.</strong> ${escapeHtml(step)}</li>`).join('')}
      </ol>
      <div class="modal-buttons" style="display:flex;gap:12px">
        <button class="btn btn-gh" onclick="closeModal()">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
};

// ============ CONTACTS ============
const renderContacts = async () => {
  const container = document.getElementById('contactsContainer');
  if(!container) return;
  const users = await getUsers();
  const family = users.filter(u => u.username !== currentUser.username);
  container.innerHTML = `
    <div style="margin-bottom:20px"><div style="font-size:24px;font-weight:800">👥 Family Members</div></div>
    ${family.map(m => `
      <div class="contact-card">
        ${m.profile_picture ? `<img src="${m.profile_picture}" class="contact-avatar">` : `<div class="contact-avatar" style="background:linear-gradient(135deg,var(--a1),var(--a3))">${getInitial(m.username)}</div>`}
        <div style="flex:1">
          <strong>${escapeHtml(m.username)}</strong><br>
          📞 ${escapeHtml(m.phone || 'No phone')}
        </div>
        <button class="btn btn-sm btn-gh" onclick="window.open('tel:${m.phone}','_blank')">📞 Call</button>
        <button class="btn btn-sm btn-gh" onclick="window.open('https://wa.me/${m.phone?.replace(/\\D/g,'')}','_blank')">💬 WhatsApp</button>
      </div>
    `).join('')}
  `;
};

// ============ SETTINGS ============
const renderSettings = () => {
  const c = document.getElementById('settingsContainer');
  c.innerHTML = `
    <div class="card">
      <div class="ctitle">👤 Profile Picture</div>
      ${currentUser.profile_picture ? `<img src="${currentUser.profile_picture}" class="profile-avatar-large">` : `<div class="profile-avatar-large" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--a1),var(--a3));font-size:48px;font-weight:700">${getInitial(currentUser.username)}</div>`}
      <div style="display:flex;gap:12px;justify-content:center">
        <button class="btn btn-sm btn-p" onclick="uploadProfilePicture()">📸 Upload Photo</button>
        <button class="btn btn-sm btn-d" onclick="removeProfilePicture()">🗑️ Remove</button>
      </div>
    </div>
    <div class="card">
      <div class="ctitle">⚙️ Account</div>
      <p><strong>${escapeHtml(currentUser.username)}</strong><br>📞 ${escapeHtml(currentUser.phone || 'No phone')}</p>
      <button class="btn btn-gh" onclick="signOut()">Sign Out</button>
    </div>
    <div class="card">
      <div class="ctitle">🌓 Appearance</div>
      <button class="btn btn-sm btn-p" onclick="toggleTheme()">Toggle Dark/Light</button>
    </div>
    <div class="card">
      <div class="ctitle">💾 Storage Info</div>
      <p>✅ Images are compressed to ~150KB each<br>📸 Store thousands of recipes within 1GB free limit<br>🔗 All data synced across family members</p>
    </div>
  `;
};

const toggleTheme = () => {
  const isDark = getComputedStyle(document.documentElement).getPropertyValue('--bg').trim() === '#0A1A1A';
  if(isDark){
    document.documentElement.style.setProperty('--bg','#F8FAFE');
    document.documentElement.style.setProperty('--bg2','#FFFFFF');
    document.documentElement.style.setProperty('--s1','#EFF3F8');
    document.documentElement.style.setProperty('--tx','#1A2C3E');
    document.documentElement.style.setProperty('--tx2','#4A627A');
    document.documentElement.style.setProperty('--a1','#0F7B7B');
  } else {
    document.documentElement.style.setProperty('--bg','#0A1A1A');
    document.documentElement.style.setProperty('--bg2','#0F2424');
    document.documentElement.style.setProperty('--s1','#1A3D3D');
    document.documentElement.style.setProperty('--tx','#E6F7F7');
    document.documentElement.style.setProperty('--tx2','#A8D4D4');
    document.documentElement.style.setProperty('--a1','#00D4D4');
  }
};

// ============ MAIN RENDER ============
const renderApp = async () => {
  const avatarHtml = currentUser?.profile_picture ? `<img src="${currentUser.profile_picture}" class="avatar-img">` : `<div class="avatar-img" style="display:flex;align-items:center;justify-content:center">${getInitial(currentUser?.username || '?')}</div>`;
  document.getElementById('app').innerHTML = `
    <div class="tbw"><div class="tb"><div class="logo">🍳 Family Vault</div><div class="tb-r">${avatarHtml}<span class="tb-name">${escapeHtml(currentUser?.username || '')}</span><button class="menu-btn" onclick="toggleMenu()">☰</button></div></div></div>
    <div id="menuOverlay" class="menu-overlay" onclick="toggleMenu()"></div>
    <div id="menuPanel" class="menu-panel"><div class="menu-header"><span style="font-weight:800">Menu</span><button class="close-btn" onclick="toggleMenu()">✕</button></div><div class="menu-items"><div class="menu-item ${currentView==='home'?'active':''}" onclick="navigateTo('home')">🏠 Home</div><div class="menu-item ${currentView==='recipes'?'active':''}" onclick="navigateTo('recipes')">🍳 Recipe Book</div><div class="menu-item ${currentView==='folders'?'active':''}" onclick="navigateTo('folders')">📸 Photo Albums</div><div class="menu-item ${currentView==='calendar'?'active':''}" onclick="navigateTo('calendar')">📅 Calendar</div><div class="menu-item ${currentView==='contacts'?'active':''}" onclick="navigateTo('contacts')">👥 Contacts</div><div class="menu-item ${currentView==='settings'?'active':''}" onclick="navigateTo('settings')">⚙️ Settings</div><div class="menu-item signout-item" onclick="signOut()">🚪 Sign Out</div></div></div>
    <div class="scr"><div id="messageContainer"></div><div id="homeContainer" class="tab-pane ${currentView==='home'?'show':''}"></div><div id="recipeContainer" class="tab-pane ${currentView==='recipes'?'show':''}"></div><div id="folderViewContainer" class="tab-pane ${currentView==='folders'?'show':''}"></div><div id="calendarContainer" class="tab-pane ${currentView==='calendar'?'show':''}"></div><div id="contactsContainer" class="tab-pane ${currentView==='contacts'?'show':''}"></div><div id="settingsContainer" class="tab-pane ${currentView==='settings'?'show':''}"></div></div><div class="bottom-nav"><button class="home-btn" onclick="navigateTo('home')">🏡 Home</button></div>
  `;
  
  if(currentView === 'home') {
    document.getElementById('homeContainer').innerHTML = `
      <div class="card" style="background:linear-gradient(135deg, var(--s1), var(--s2));text-align:center">
        <div style="font-size:56px;margin-bottom:12px">🍳📸</div>
        <div style="font-size:28px;font-weight:800;margin-bottom:8px">Welcome, ${escapeHtml(currentUser.username)}</div>
        <div style="font-size:13px;color:var(--tx2);margin-bottom:20px">Family recipes, photos & memories — all in one place</div>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-p" onclick="navigateTo('recipes')">🍳 Recipe Book</button>
          <button class="btn btn-gh" onclick="navigateTo('folders')">📸 Photo Albums</button>
        </div>
      </div>
      <div class="card"><div class="ctitle">📊 Family Snapshot</div><div style="display:grid;grid-template-columns:repeat(3,1fr);text-align:center"><div><div style="font-size:32px;font-weight:800;color:var(--a1)">${recipes.length}</div><div>Recipes</div></div><div><div style="font-size:32px;font-weight:800;color:var(--a1)">${folders.length}</div><div>Albums</div></div><div><div style="font-size:32px;font-weight:800;color:var(--a1)">${calendarEvents.length}</div><div>Events</div></div></div></div>
      <div class="card"><div class="ctitle">💡 How To Use</div><div style="font-size:13px;line-height:1.6">📸 <strong>Photo Albums:</strong> Create folders and paste Google Drive links<br>🍳 <strong>Recipes:</strong> Add manually, take photo, or upload from gallery<br>📅 <strong>Calendar:</strong> Add family events so everyone stays informed<br>👥 <strong>Contacts:</strong> Call or WhatsApp family members directly</div></div>
    `;
  }
  if(currentView === 'recipes') renderRecipeView();
  if(currentView === 'folders') renderFoldersView();
  if(currentView === 'calendar') renderCalendarView();
  if(currentView === 'contacts') renderContacts();
  if(currentView === 'settings') renderSettings();
  resetSessionTimer();
};

// ============ NAVIGATION & AUTH ============
const navigateTo = (view) => { currentView = view; if(menuOpen) toggleMenu(); renderApp(); };
const toggleMenu = () => { menuOpen = !menuOpen; const ov=document.getElementById('menuOverlay'), pn=document.getElementById('menuPanel'); if(ov&&pn){ ov.classList.toggle('show',menuOpen); pn.classList.toggle('show',menuOpen); }};
const signOut = () => { if(appSessionTimer) clearTimeout(appSessionTimer); currentUser = null; localStorage.removeItem('family_vault_user'); showLogin(); };
const closeModal = () => document.querySelectorAll('.modal-overlay').forEach(m => m.remove());

const doLogin = async () => {
  const username = document.getElementById('loginUsername')?.value.trim();
  const password = document.getElementById('loginPassword')?.value.trim();
  const admin = ADMINS.find(a => a.username === username && a.password === password);
  if(admin) { currentUser = admin; localStorage.setItem('family_vault_user', username); await loadFoldersFromCloud(); await loadCalendarEvents(); await loadRecipes(); bindActivity(); renderApp(); return; }
  const users = await getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if(user) { currentUser = user; localStorage.setItem('family_vault_user', username); await loadFoldersFromCloud(); await loadCalendarEvents(); await loadRecipes(); bindActivity(); renderApp(); }
  else showMessage("Invalid credentials","error");
};

const doSignup = async () => {
  const username = document.getElementById('signupUsername')?.value.trim();
  const phone = document.getElementById('signupPhone')?.value.trim();
  const password = document.getElementById('signupPassword')?.value.trim();
  const confirm = document.getElementById('signupConfirm')?.value.trim();
  const securityQuestion = document.getElementById('securityQuestion')?.value;
  const securityAnswer = document.getElementById('securityAnswerInput')?.value.trim();
  if(!username || username.length < 3) { showMessage('Username: min 3 characters', 'error'); return; }
  if(!phone || phone.length < 10) { showMessage('Valid phone number required', 'error'); return; }
  if(password.length < 6) { showMessage('Password: min 6 characters', 'error'); return; }
  if(password !== confirm) { showMessage('Passwords do not match', 'error'); return; }
  if(!securityQuestion) { showMessage('Select a security question', 'error'); return; }
  if(!securityAnswer) { showMessage('Enter security answer', 'error'); return; }
  const users = await getUsers();
  if(users.find(u => u.username === username)) { showMessage('Username taken', 'error'); return; }
  if(users.find(u => u.phone === phone)) { showMessage('Phone already registered', 'error'); return; }
  const success = await supabaseFetch('users', 'POST', { username, phone, password, role: 'user', security_question: securityQuestion, security_answer: securityAnswer.toLowerCase(), created_at: new Date().toISOString() });
  if(success.ok) { showMessage('Account created! Please sign in.', 'success'); showLogin(); }
  else showMessage('Error creating account', 'error');
};

const showLogin = () => {
  document.getElementById('app').innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:20px;background:var(--bg)">
      <div style="text-align:center;margin-bottom:32px">
        <div style="font-size:64px">🍳👨‍👩‍👧‍👦</div>
        <h1 style="color:var(--a1);font-size:32px">Family Vault</h1>
        <p style="color:var(--tx2)">Recipes · Photos · Memories</p>
      </div>
      <div id="loginForm">
        <div class="card">
          <div class="ctitle">Sign In</div>
          <input id="loginUsername" placeholder="Username">
          <div class="pw-w">
            <input id="loginPassword" type="password" placeholder="Password">
            <button class="eye-btn" onclick="togglePassword('loginPassword')">👁️</button>
          </div>
          <button class="btn btn-p" onclick="doLogin()">Sign In</button>
          <button class="btn btn-gh" style="margin-top:12px" onclick="showSignup()">Create Account</button>
        </div>
      </div>
      <div id="signupForm" style="display:none">
        <div class="card">
          <div class="ctitle">Create Account</div>
          <input id="signupUsername" placeholder="Username (min 3 chars)">
          <input id="signupPhone" placeholder="Phone number">
          <div class="pw-w">
            <input id="signupPassword" type="password" placeholder="Password (min 6 chars)">
            <button class="eye-btn" onclick="togglePassword('signupPassword')">👁️</button>
          </div>
          <div class="pw-w">
            <input id="signupConfirm" type="password" placeholder="Confirm password">
            <button class="eye-btn" onclick="togglePassword('signupConfirm')">👁️</button>
          </div>
          <div class="ctitle" style="margin-top:16px">🔐 Security Question</div>
          <select id="securityQuestion">
            <option value="">Select a security question...</option>
            ${SECURITY_QUESTIONS.map(q => `<option value="${escapeHtml(q)}">${escapeHtml(q)}</option>`).join('')}
          </select>
          <input id="securityAnswerInput" placeholder="Your answer">
          <button class="btn btn-p" onclick="doSignup()">Create Account</button>
          <button class="btn btn-gh" style="margin-top:12px" onclick="showSignupBack()">Back to Sign In</button>
        </div>
      </div>
      <div id="messageContainer"></div>
    </div>
  `;
};

const showSignup = () => { document.getElementById('loginForm').style.display = 'none'; document.getElementById('signupForm').style.display = 'block'; };
const showSignupBack = () => { document.getElementById('signupForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'block'; };
const togglePassword = (id) => { const inp = document.getElementById(id); if(inp) inp.type = inp.type === 'password' ? 'text' : 'password'; };

ALTER TABLE users ADD COLUMN IF NOT EXISTS profile_picture TEXT;
*/

// ============ INITIALIZATION ============
window.onload = async () => {
  window.navigateTo = navigateTo;
  window.signOut = signOut;
  window.toggleMenu = toggleMenu;
  window.closeModal = closeModal;
  window.createFolderPrompt = createFolderPrompt;
  window.showEditLinkModal = showEditLinkModal;
  window.openCloudFolder = openCloudFolder;
  window.showAddEventModal = showAddEventModal;
  window.openManualRecipeForm = openManualRecipeForm;
  window.capturePhoto = capturePhoto;
  window.uploadFromGallery = uploadFromGallery;
  window.viewRecipeDetail = viewRecipeDetail;
  window.toggleTheme = toggleTheme;
  window.doLogin = doLogin;
  window.doSignup = doSignup;
  window.showSignup = showSignup;
  window.showSignupBack = showSignupBack;
  window.togglePassword = togglePassword;
  window.uploadProfilePicture = uploadProfilePicture;
  window.removeProfilePicture = removeProfilePicture;
  
  const savedUser = localStorage.getItem('family_vault_user');
  if(savedUser) {
    const users = await getUsers();
    const found = users.find(u => u.username === savedUser);
    if(found) { currentUser = found; await loadFoldersFromCloud(); await loadCalendarEvents(); await loadRecipes(); bindActivity(); renderApp(); return; }
  }
  showLogin();
};
</script>
