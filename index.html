html {
  font-size: clamp(12px, 4vw, 16px);
}
@media screen and (max-width: 380px) {
  .sh-t { font-size: 14px !important; }
  .stat-num { font-size: 16px !important; }
  .folder-name { font-size: 10px !important; }
  .btn { padding: 5px 8px !important; font-size: 10px !important; }
  .card { padding: 8px !important; }
  .tb-name { max-width: 50px !important; font-size: 10px !important; }
  .nav-tab .nt-label { font-size: 7px !important; }
  .nav-tab .nt-icon { font-size: 16px !important; }
  .cal-day-num { font-size: 9px !important; }
  .event-title { font-size: 11px !important; }
}
@media screen and (max-width: 320px) {
  .folder-grid { grid-template-columns: 1fr !important; gap: 6px !important; }
  .stats-grid { gap: 4px !important; }
  .stat-card { padding: 4px !important; }
  .recipe-meta { flex-wrap: wrap !important; }
}

  padding: 4px 2px calc(env(safe-area-inset-bottom) + 4px);
  min-height: 54px;
}
.nav-tab {
  min-width: 38px;
  padding: 2px 3px;
}
button, .nav-tab, .menu-item, .folder-card {
  min-height: 40px;
}
@media screen and (max-width: 400px) {
  .folder-grid {
    grid-template-columns: 1fr;
    gap: 6px;
  }
}
.folder-grid {
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}

.folder-card {
  padding: 6px 4px !important;

}

.folder-card .folder-icon {
  font-size: 22px !important;
  margin-bottom: 2px !important;
}

.folder-card .folder-name {
  font-size: 10px !important;
  margin-bottom: 2px !important;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.folder-card div[style*="font-size:9px"] {

}

.folder-card .folder-actions {

}

.folder-card .btn-sm {

}

@media screen and (max-width: 450px) {
  .folder-grid {
    grid-template-columns: 1fr;
  }

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:14px; }
body { font-family:'Figtree',sans-serif; background:var(--bg); color:var(--tx); min-height:100vh; transition:background .3s,color .3s; }
#app { width:100%; max-width:560px; margin:0 auto; min-height:100vh; background:var(--bg); position:relative; }

/* TOP BAR */
.tbw { position:sticky; top:0; z-index:200; background:var(--bg2); border-bottom:1px solid var(--bd); height:44px; box-shadow:var(--shadow-sm); }
.tb { height:100%; display:flex; align-items:center; justify-content:space-between; padding:0 10px; }
.logo { font-size:13px; font-weight:900; color:var(--a1); display:flex; align-items:center; gap:6px; letter-spacing:-.3px; }
.logo-icon { width:24px; height:24px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:12px; }
.tb-r { display:flex; align-items:center; gap:5px; }
.av { width:26px; height:26px; border-radius:7px; background:linear-gradient(135deg,var(--a1),var(--a3)); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:11px; color:var(--btn-text); flex-shrink:0; overflow:hidden; cursor:pointer; }
.av img { width:100%; height:100%; object-fit:cover; border-radius:7px; }
.tb-name { font-size:11px; font-weight:600; max-width:65px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--tx2); }
.icon-btn { background:var(--s1); border:1px solid var(--bd); border-radius:7px; cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-size:13px; transition:all .2s; color:var(--tx2); }
.icon-btn:active { transform:scale(.93); }

/* DRAWER MENU */
.menu-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.6); z-index:300; display:none; backdrop-filter:blur(5px); }
.menu-overlay.show { display:block; }
.menu-panel { position:fixed; top:0; right:-270px; width:270px; height:100%; background:var(--bg2); z-index:301; transition:right .3s cubic-bezier(.4,0,.2,1); box-shadow:-4px 0 28px rgba(0,0,0,.35); display:flex; flex-direction:column; border-left:1px solid var(--bd); }
.menu-panel.show { right:0; }
.menu-header { padding:12px 12px 10px; border-bottom:1px solid var(--bd); }
.menu-header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.menu-title { font-weight:800; font-size:10px; color:var(--tx3); text-transform:uppercase; letter-spacing:1px; }
.menu-user { display:flex; align-items:center; gap:8px; }
.menu-av { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,var(--a1),var(--a3)); display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; color:var(--btn-text); overflow:hidden; flex-shrink:0; }
.menu-av img { width:100%; height:100%; object-fit:cover; }
.menu-username { font-weight:800; font-size:13px; }
.menu-phone { font-size:10px; color:var(--tx3); margin-top:1px; }
.close-btn { background:var(--s1); border:1px solid var(--bd); border-radius:7px; color:var(--tx2); font-size:13px; cursor:pointer; width:26px; height:26px; display:flex; align-items:center; justify-content:center; }
.menu-items { flex:1; padding:6px; overflow-y:auto; }
.menu-item { display:flex; align-items:center; gap:8px; padding:8px 9px; border-radius:8px; cursor:pointer; color:var(--tx2); font-size:12px; font-weight:600; transition:all .18s; margin-bottom:1px; }
.menu-item:hover { background:var(--s1); color:var(--tx); }
.menu-item.active { background:var(--a1); color:var(--btn-text); }
.menu-item .mi-icon { font-size:14px; width:18px; text-align:center; }
.menu-item.danger { color:var(--danger); }
.menu-item.danger:hover { background:var(--danger-bg); }
.menu-divider { height:1px; background:var(--bd); margin:4px 0; }

/* BOTTOM NAV */
.bottom-nav { position:sticky; bottom:0; z-index:200; background:var(--nav-bg); border-top:1px solid var(--bd); display:flex; justify-content:space-around; padding:4px 2px calc(env(safe-area-inset-bottom) + 4px); box-shadow:0 -1px 10px rgba(0,0,0,.12); }
.nav-tab { display:flex; flex-direction:column; align-items:center; gap:1px; cursor:pointer; padding:3px 6px; border-radius:8px; transition:all .18s; border:none; background:none; color:var(--tx3); min-width:44px; font-family:'Figtree',sans-serif; }
.nav-tab.active { color:var(--a1); }
.nav-tab .nt-icon { font-size:18px; line-height:1; }
.nav-tab .nt-label { font-size:8px; font-weight:700; letter-spacing:.3px; }

/* SCREEN */
.scr { padding:8px 8px 12px; min-height:calc(100vh - 108px); }
.tab-pane { display:none; animation:fadeIn .18s ease; }
.tab-pane.show { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

/* CARDS */
.card { background:var(--s1); border:1px solid var(--bd); border-radius:12px; padding:10px; margin-bottom:6px; box-shadow:var(--shadow-sm); }
.ctitle { font-size:8.5px; font-weight:800; text-transform:uppercase; letter-spacing:1.4px; color:var(--tx3); margin-bottom:8px; }
.sh { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px; flex-wrap:wrap; gap:6px; }
.sh-t { font-size:16px; font-weight:900; color:var(--tx); letter-spacing:-.3px; }
.sh-s { font-size:10px; color:var(--tx3); margin-top:2px; font-weight:500; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:4px; padding:7px 12px; border:none; border-radius:8px; font-weight:700; font-size:11px; cursor:pointer; transition:all .18s; font-family:'Figtree',sans-serif; letter-spacing:.1px; }
.btn:active { transform:scale(.96); }
.btn-w { width:100%; }
.btn-p { background:linear-gradient(135deg,var(--a1),var(--a3)); color:var(--btn-text); }
.btn-d { background:var(--danger-bg); color:var(--danger); border:1px solid rgba(255,95,109,.2); }
.btn-gh { background:var(--s2); color:var(--tx2); border:1px solid var(--bd); }
.btn-sm { padding:4px 9px; font-size:10.5px; border-radius:7px; }
.btn-lg { padding:9px 16px; font-size:12px; }
.btn-recipe { background:linear-gradient(135deg,#FF9F5A,#E07030); color:#fff; }
.btn-location { background:linear-gradient(135deg,#6EE7B7,#1A9B6E); color:#fff; }

/* INPUTS */
input, textarea, select { width:100%; padding:7px 10px; background:var(--bg3); border:1.5px solid var(--bd); border-radius:8px; color:var(--tx); font-size:12px; font-family:'Figtree',sans-serif; margin-bottom:6px; outline:none; transition:border-color .2s,box-shadow .2s; }
input:focus, textarea:focus, select:focus { border-color:var(--a1); box-shadow:0 0 0 2px rgba(61,217,217,.1); }
input::placeholder, textarea::placeholder { color:var(--tx3); }
select option { background:var(--bg3); color:var(--tx); }
textarea { resize:vertical; min-height:60px; }

/* THEME PICKER */
.theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:6px; }
.theme-swatch { border-radius:10px; padding:8px 4px 6px; text-align:center; cursor:pointer; border:2px solid transparent; transition:all .2s; position:relative; overflow:hidden; }
.theme-swatch.active { border-color:var(--a1); }
.theme-swatch .sw-preview { width:28px; height:28px; border-radius:50%; margin:0 auto 4px; display:flex; align-items:center; justify-content:center; font-size:14px; }
.theme-swatch .sw-label { font-size:9px; font-weight:700; color:var(--tx2); }

/* ALERTS */
.al { padding:6px 10px; border-radius:7px; font-size:11px; margin-bottom:6px; font-weight:500; }
.al-s { background:rgba(61,217,160,.15); color:var(--success); }
.al-e { background:var(--danger-bg); color:var(--danger); }
.al-i { background:rgba(61,217,217,.1); color:var(--a1); }

/* MODAL */
.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.8); z-index:1000; display:flex; align-items:center; justify-content:center; padding:14px; animation:fadeIn .15s ease; backdrop-filter:blur(7px); }
.modal-content { background:var(--s1); border:1px solid var(--bd2); border-radius:14px; padding:14px 12px 12px; width:100%; max-width:340px; box-shadow:0 20px 50px rgba(0,0,0,.55); max-height:90vh; overflow-y:auto; }
.modal-title { font-size:14px; font-weight:900; color:var(--tx); margin-bottom:3px; letter-spacing:-.2px; }
.modal-sub { font-size:10px; color:var(--tx2); margin-bottom:10px; line-height:1.5; }
.modal-buttons { display:flex; gap:6px; margin-top:10px; }
.modal-buttons button { flex:1; }

/* FOLDER GRID */
.folder-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-bottom:12px; }
.folder-card { background:var(--s1); border:1.5px solid var(--bd); border-radius:12px; padding:10px 8px; cursor:pointer; transition:all .2s; text-align:center; position:relative; box-shadow:var(--shadow-sm); }
.folder-card:active { transform:scale(.97); }
.folder-card .folder-icon { font-size:26px; margin-bottom:4px; }
.folder-card .folder-name { font-weight:800; font-size:11px; margin-bottom:2px; word-break:break-word; }
.folder-actions { display:flex; gap:4px; margin-top:6px; justify-content:center; }

/* CONTACTS */
.ccard { background:var(--s1); border:1px solid var(--bd); border-radius:10px; padding:8px 10px; margin-bottom:6px; display:flex; align-items:center; gap:8px; box-shadow:var(--shadow-sm); }
.c-av { width:34px; height:34px; background:linear-gradient(135deg,var(--a1),var(--a3)); border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:13px; color:var(--btn-text); flex-shrink:0; overflow:hidden; }
.c-av img { width:100%; height:100%; object-fit:cover; }

/* LOGIN */

const sortFolders = (foldersToSort) => {
  const sorted = [...foldersToSort];
  switch (folderSortBy) {
    case 'name':
      sorted.sort((a, b) => a.name.localeCompare(b.name));
      break;
    case 'date':
      sorted.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      break;
    case 'creator':
      sorted.sort((a, b) => a.createdBy.localeCompare(b.createdBy));
      break;
    default:
      sorted.sort((a, b) => a.name.localeCompare(b.name));
  }
  return sorted;
};

// ============ AUTO LOCATION TRACKING ============
let locationWatchId = null;
let locationUpdateThrottle = null;

const startAutoLocationTracking = () => {
  if (!navigator.geolocation) return;
  if (locationWatchId !== null) return; // already running
  console.log('📍 Auto location tracking started');
  locationWatchId = navigator.geolocation.watchPosition(
    async (pos) => {
      // Throttle updates to once per 30 seconds to avoid hammering Supabase
      if (locationUpdateThrottle) return;
      locationUpdateThrottle = setTimeout(() => { locationUpdateThrottle = null; }, 30000);
      const { latitude, longitude } = pos.coords;
      const updates = {
        location_lat: latitude,
        location_lng: longitude,
        location_updated: new Date().toISOString()
      };
      await upsertUserProfile(currentUser.username, updates);
      console.log('📍 Location auto-updated:', latitude, longitude);
    },
    (err) => { console.log('Location watch error:', err.message); },
    { enableHighAccuracy: true, timeout: 20000, maximumAge: 15000 }
  );
};

const stopAutoLocationTracking = () => {
  if (locationWatchId !== null) {
    navigator.geolocation.clearWatch(locationWatchId);
    locationWatchId = null;
    console.log('📍 Auto location tracking stopped');
  }
  if (locationUpdateThrottle) { clearTimeout(locationUpdateThrottle); locationUpdateThrottle = null; }
};

const escapeHtml = (text) => {
  if (!text) return '';
  return String(text).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
};
const getInitial = (name) => name ? name.charAt(0).toUpperCase() : '?';
const pad2 = (n) => String(n).padStart(2, '0');
const toDateStr = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
const formatDate = (dateStr) => {
  const [y,m,d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
};
const formatDateFull = (dateStr) => {
  const [y,m,d] = dateStr.split('-');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dt = new Date(parseInt(y), parseInt(m)-1, parseInt(d));
  return `${days[dt.getDay()]}, ${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
};
const monthName = (m) => ['January','February','March','April','May','June','July','August','September','October','November','December'][m];
const shortMonth = (m) => ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m];

const timeAgoStr = (isoStr) => {
  if (!isoStr) return 'Never';
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
};

const upsertUserProfile = async (username, updates) => {
  try {
    if (!userProfiles[username]) userProfiles[username] = { sharing_with: [] };
    Object.assign(userProfiles[username], updates);
    const prof = userProfiles[username];
    const payload = {
      username,
      avatar_url: prof.avatar_url || null,
      location_lat: prof.location_lat || null,
      location_lng: prof.location_lng || null,
      location_updated: prof.location_updated || null,
      sharing_with: JSON.stringify(prof.sharing_with || [])
    };
    const rPatch = await sbFetch(`user_profiles?username=eq.${encodeURIComponent(username)}`, 'PATCH', payload);
    if (!rPatch.ok) await sbFetch('user_profiles', 'POST', payload);
    return true;
  } catch(e) { console.error(e); return false; }
};

// ============ IMAGE COMPRESSION ============
// Compresses any image to JPEG at a target max dimension and quality.
// Returns a base64 data URL. maxPx = longest edge in pixels, quality 0-1.
const compressImage = (file, maxPx = 1200, quality = 0.78) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onerror = () => reject(new Error('Read failed'));
  reader.onload = (e) => {
    const img = new Image();
    img.onerror = () => reject(new Error('Image load failed'));
    img.onload = () => {
      let { width, height } = img;
      if (width > maxPx || height > maxPx) {
        if (width >= height) { height = Math.round(height * maxPx / width); width = maxPx; }
        else { width = Math.round(width * maxPx / height); height = maxPx; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      resolve(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

  showMessage(`Getting ${username}'s location...`, 'info');

  try {
    const r = await sbFetch(`user_profiles?username=eq.${encodeURIComponent(username)}&select=*`, 'GET');
    if (r.ok) {
      const data = await r.json();
      if (data.length > 0) {
        const prof = data[0];
        if (!userProfiles[username]) userProfiles[username] = {};
        userProfiles[username].location_lat = prof.location_lat;
        userProfiles[username].location_lng = prof.location_lng;
        userProfiles[username].location_updated = prof.location_updated;
        userProfiles[username].sharing_with = prof.sharing_with ? JSON.parse(prof.sharing_with) : [];
      }
    }
  } catch(e) { console.error(e); }

  const prof = userProfiles[username];
  if (!prof?.location_lat || !prof?.location_lng) {
    showMessage(`${username}'s location is not available. They may need to open the app.`, 'error');
    return;
  }
  
  // Open maps directly without confirmation
  const url = `https://www.google.com/maps/search/?api=1&query=${prof.location_lat},${prof.location_lng}`;

const renderCalendar = () => {
  const container = document.getElementById('calendarContainer'); if (!container) return;
  const year = calendarDate.getFullYear(), month = calendarDate.getMonth();
  const today = toDateStr(new Date());
  let startDow = new Date(year, month, 1).getDay(); startDow = startDow === 0 ? 6 : startDow - 1;
  const lastDate = new Date(year, month + 1, 0).getDate();
  const days = [];
  for (let i = 0; i < startDow; i++) { const d = new Date(year, month, 1 - startDow + i); days.push({ dateStr: toDateStr(d), num: d.getDate(), other: true }); }
  for (let d = 1; d <= lastDate; d++) days.push({ dateStr: `${year}-${pad2(month+1)}-${pad2(d)}`, num: d, other: false });
  while (days.length < 42) { const d = new Date(year, month + 1, days.length - startDow - lastDate + 1); days.push({ dateStr: toDateStr(d), num: d.getDate(), other: true }); }
  const evByDate = {};
  calendarEvents.forEach(ev => { if (!evByDate[ev.eventDate]) evByDate[ev.eventDate] = []; evByDate[ev.eventDate].push(ev); });
  let listEvents = calendarEvents.filter(ev => { const [y,m] = ev.eventDate.split('-'); return parseInt(y)===year && parseInt(m)===(month+1); });
  if (calendarSelectedDay) listEvents = listEvents.filter(ev => ev.eventDate === calendarSelectedDay);
  if (calendarFilter !== 'all') listEvents = listEvents.filter(ev => ev.eventType === calendarFilter);
  const dayHeaders = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  container.innerHTML = `
    <div class="sh"><div><div class="sh-t">📅 Calendar</div><div class="sh-s">Family events &amp; birthdays</div></div><button class="btn btn-p btn-sm" onclick="openAddEventModal('${today}')">+ Add</button></div>
    <div class="cal-header"><button class="cal-nav-btn" onclick="calPrevMonth()">‹</button><div class="cal-month-label">${monthName(month)} ${year}</div><button class="cal-nav-btn" onclick="calNextMonth()">›</button></div>
    <div class="cal-grid">
      <div class="cal-day-headers">${dayHeaders.map(d => `<div class="cal-day-hdr">${d}</div>`).join('')}</div>
      <div class="cal-days">
        ${days.map(day => {
          const dayEvs = evByDate[day.dateStr] || [];
          const isToday = day.dateStr === today, isSelected = day.dateStr === calendarSelectedDay;
          let cls = 'cal-day'; if (day.other) cls += ' other-month'; if (isToday && !isSelected) cls += ' today'; if (isSelected) cls += ' selected';
          const dots = dayEvs.slice(0,3).map(e => `<span class="cal-dot ${(EVENT_TYPES[e.eventType]||EVENT_TYPES.event).dotClass}"></span>`).join('');
          return `<div class="${cls}" onclick="calSelectDay('${day.dateStr}')"><span class="cal-day-num">${day.num}</span><div class="cal-dot-row">${dots}</div></div>`;
        }).join('')}
      </div>
    </div>
    <div class="pill-tabs">
      <button class="pill-tab ${calendarFilter==='all'?'active':''}" onclick="calSetFilter('all')">All</button>
      ${Object.entries(EVENT_TYPES).map(([k,v]) => `<button class="pill-tab ${calendarFilter===k?'active':''}" onclick="calSetFilter('${k}')">${v.icon} ${v.label}</button>`).join('')}
    </div>
    ${calendarSelectedDay ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px"><div style="font-size:12px;font-weight:700;color:var(--a1)">📍 ${formatDate(calendarSelectedDay)}</div><div style="display:flex;gap:5px"><button class="btn btn-sm btn-p" onclick="openAddEventModal('${calendarSelectedDay}')">+ Add</button><button class="btn btn-sm btn-gh" onclick="calSelectDay('${calendarSelectedDay}')">Show All</button></div></div>` : `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:var(--tx3)">${monthName(month)} · ${listEvents.length} event${listEvents.length!==1?'s':''}</div></div>`}
    ${listEvents.length === 0 ? `<div class="empty-state"><div class="empty-icon">🗓️</div><div class="empty-text">${calendarSelectedDay ? 'No events on this day' : 'No events this month'}</div><div class="empty-sub">Tap a day or use "+ Add"</div></div>` : listEvents.map(ev => {
      const et = EVENT_TYPES[ev.eventType] || EVENT_TYPES.event, canEdit = canEditEvent(ev);
      let ageDisplay = '';
if (ev.eventType === 'birthday' && ev.yearOfBirth) {
  const birthYear = parseInt(ev.yearOfBirth);
  const eventDateObj = new Date(ev.eventDate);
  const todayDate = new Date();
  let age = eventDateObj.getFullYear() - birthYear;
  const birthMonth = eventDateObj.getMonth();
  const birthDay = eventDateObj.getDate();
  const todayMonth = todayDate.getMonth();
  const todayDay = todayDate.getDate();
  
  let willTurnAge = age;
  let currentAge = age - 1;
  
  const hasPassed = (todayMonth > birthMonth) || (todayMonth === birthMonth && todayDay >= birthDay);
  
  if (hasPassed) {
    ageDisplay = `<div style="font-size:10px;color:var(--a1);margin-top:2px">🎂 Turns ${age} years old (${currentAge} currently)</div>`;
  } else {
    ageDisplay = `<div style="font-size:10px;color:var(--a1);margin-top:2px">🎂 Will turn ${age} years old</div>`;
  }
}
      return `<div class="event-card"><div class="event-icon ${et.iconClass}">${et.icon}</div><div style="flex:1;min-width:0"><div class="event-title">${escapeHtml(ev.title)}</div><div style="margin-top:2px"><span class="event-badge ${et.badgeClass}">${et.label}</span></div><div class="event-date-label" style="margin-top:4px">📅 ${formatDateFull(ev.eventDate)}</div>${ageDisplay}${ev.description ? `<div class="event-desc">${escapeHtml(ev.description)}</div>` : ''}<div class="event-date-label" style="margin-top:4px">👤 ${escapeHtml(ev.createdBy)}</div>${canEdit ? `<div class="event-actions"><button class="btn btn-sm btn-gh" onclick="openEditEventModal(${ev.id})">✏️ Edit</button><button class="btn btn-sm btn-d" onclick="confirmDeleteEvent(${ev.id})">🗑️ Delete</button></div>` : ''}</div></div>`;
    }).join('')}
  `;
};

const updateProfile = async () => {
  const newUsername = document.getElementById('editUsername')?.value.trim();
  const newPhone = document.getElementById('editPhone')?.value.trim();
  if (!newUsername || newUsername.length < 3) { showMessage('Username: min 3 characters', 'error'); return; }
  if (!newPhone || newPhone.length < 10) { showMessage('Valid phone number required', 'error'); return; }
  if (newUsername !== currentUser.username) { const users = await getUsers(); if (users.find(u => u.username === newUsername)) { showMessage('Username already taken', 'error'); return; } }
  const success = await updateUser(currentUser.username, { username: newUsername, phone: newPhone });
  if (success) { currentUser.username = newUsername; currentUser.phone = newPhone; localStorage.setItem('family_vault_user', newUsername); showMessage('Profile updated!', 'success'); renderApp(); }
  else showMessage('Error updating profile', 'error');
};
const changePassword = async () => {
  const currentPw = document.getElementById('currentPassword')?.value.trim();
  const newPw = document.getElementById('newPassword')?.value.trim();
  const confirmPw = document.getElementById('confirmPassword')?.value.trim();
  if (!currentPw || !newPw) { showMessage('Please fill all fields', 'error'); return; }
  if (newPw.length < 6) { showMessage('New password: min 6 characters', 'error'); return; }
  if (newPw !== confirmPw) { showMessage('New passwords do not match', 'error'); return; }
  const users = await getUsers();
  const user = users.find(u => u.username === currentUser.username);
  if (!user || user.password !== currentPw) { showMessage('Current password is incorrect', 'error'); return; }
  const success = await updateUser(currentUser.username, { password: newPw });
  if (success) { showMessage('Password updated!', 'success'); document.getElementById('currentPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; }
  else showMessage('Error updating password', 'error');
};
const togglePassword = (inputId) => { const input = document.getElementById(inputId); if (input) input.type = input.type === 'password' ? 'text' : 'password'; };
const deleteUserAccount = async (username) => {
  if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
  const success = await deleteUser(username);
  if (success) { showMessage(`User "${username}" deleted!`, 'success'); renderAdminPanel(); }
  else showMessage('Error deleting user', 'error');
};

};














// ============ PULL TO REFRESH ============
let touchStartY = 0;
let isRefreshing = false;
let refreshThreshold = 60;
let isDraggingFromTop = false;

const addPullToRefresh = () => {
  const scr = document.querySelector('.scr');
  if (!scr) return;
  
  // Create refresh indicator
  const refreshIndicator = document.createElement('div');
  refreshIndicator.className = 'refresh-indicator';
  refreshIndicator.innerHTML = '<div class="refresh-spinner"></div><span>Pull to refresh...</span>';
  scr.parentElement.style.position = 'relative';
  scr.parentElement.insertBefore(refreshIndicator, scr);
  
  let startY = 0;
  let pulling = false;
  
  scr.addEventListener('touchstart', (e) => {
    // Check if we're at the very top of the page
    if (scr.scrollTop === 0 && !isRefreshing) {
      startY = e.touches[0].clientY;
      // Only enable if touch starts near the top edge (first 50px of screen)
      isDraggingFromTop = startY < 80;
      pulling = true;
    }
  });
  
  scr.addEventListener('touchmove', (e) => {
    if (pulling && scr.scrollTop === 0 && !isRefreshing && isDraggingFromTop) {
      const currentY = e.touches[0].clientY;
      const distance = currentY - startY;
      
      // Only trigger if pulling down
      if (distance > 5) {
        e.preventDefault();
        
        const pullDistance = Math.min(distance, refreshThreshold);
        
        if (pullDistance > refreshThreshold - 10) {
          refreshIndicator.innerHTML = '<div class="refresh-spinner"></div><span>Release to refresh...</span>';
        } else {
          refreshIndicator.innerHTML = '<div class="refresh-spinner"></div><span>Pull to refresh...</span>';
        }
        
        refreshIndicator.style.top = `${pullDistance}px`;
      }
    }
  });
  
  scr.addEventListener('touchend', async (e) => {
    if (pulling && scr.scrollTop === 0 && !isRefreshing && isDraggingFromTop) {
      const endY = e.changedTouches[0].clientY;
      const distance = endY - startY;
      
      if (distance >= refreshThreshold - 10) {
        await performRefresh();
      }
      
      refreshIndicator.style.top = '-50px';
      pulling = false;
      isDraggingFromTop = false;
      startY = 0;
    }
    pulling = false;
    isDraggingFromTop = false;
  });
};

const performRefresh = async () => {
  if (isRefreshing) return;
  isRefreshing = true;
  
  const refreshIndicator = document.querySelector('.refresh-indicator');
  if (refreshIndicator) {
    refreshIndicator.innerHTML = '<div class="refresh-spinner"></div><span>Refreshing...</span>';
    refreshIndicator.style.top = '0';
  }
  
  try {
    // Refresh all data
    await Promise.all([
      loadFoldersFromCloud(),
      loadCalendarEvents(),
      loadRecipes(),
      loadUserProfiles()
    ]);
    
    // Re-render current view
    if (currentView === 'home') renderHome();
    else if (currentView === 'folders') renderFolderView();
    else if (currentView === 'calendar') renderCalendar();
    else if (currentView === 'recipes') renderRecipes();
    else if (currentView === 'contacts') renderContacts();
    else if (currentView === 'settings') renderSettings();
    else if (currentView === 'admin') renderAdminPanel();
    
    showMessage('Refreshed successfully! ✅', 'success');
  } catch (error) {
    console.error('Refresh error:', error);
    showMessage('Refresh failed. Check connection.', 'error');
  }
  
  // Hide indicator
  setTimeout(() => {
    if (refreshIndicator) {
      refreshIndicator.style.top = '-50px';
      refreshIndicator.innerHTML = '<div class="refresh-spinner"></div><span>Pull to refresh...</span>';
    }
    isRefreshing = false;
  }, 800);
};

// Call this after renderApp or in window.onload
const initPullToRefresh = () => {
  setTimeout(addPullToRefresh, 500);
};


// ============ ADMIN MANAGEMENT ============
const makeUserAdmin = async (username) => {
  if (currentUser.role !== 'admin') {
    showMessage('Only admins can promote users.', 'error');
    return;
  }
  
  if (!confirm(`Make "${username}" an admin? They will have full access to edit/delete everything.`)) return;
  
  const success = await updateUser(username, { role: 'admin' });
  if (success) {
    showMessage(`✅ ${username} is now an admin!`, 'success');
    renderAdminPanel(); // Refresh admin panel
    if (currentView === 'contacts') renderContacts(); // Refresh contacts view
  } else {
    showMessage('Error promoting user to admin', 'error');
  }
};

const removeAdmin = async (username) => {
  if (currentUser.role !== 'admin') {
    showMessage('Only admins can remove admin privileges.', 'error');
    return;
  }
  
  if (username === currentUser.username) {
    showMessage('You cannot remove your own admin privileges.', 'error');
    return;
  }
  
  if (!confirm(`Remove admin privileges from "${username}"?`)) return;
  
  const success = await updateUser(username, { role: 'user' });
  if (success) {
    showMessage(`✅ ${username} is no longer an admin.`, 'success');
    renderAdminPanel(); 
    if (currentView === 'contacts') renderContacts();
  } else {
    showMessage('Error removing admin privileges', 'error');
  }
};



// ============ AUTH ============
const doLogin = async () => {
  const username = document.getElementById('loginUsername')?.value.trim();
  const password = document.getElementById('loginPassword')?.value.trim();
  const remember = document.getElementById('rememberMe')?.checked || false;
  if (!username || !password) { showMessage('Enter username and password', 'error'); return; }
  const admin = ADMINS.find(a => a.username === username && a.password === password);
  if (admin) {
    currentUser = { ...admin, role: 'admin' };
    if (remember) localStorage.setItem('family_vault_user', username);
    await Promise.all([loadFoldersFromCloud(), loadCalendarEvents(), loadRecipes(), loadUserProfiles()]);
    startAutoLocationTracking(); // ? start auto-tracking after login
    renderApp(); return;
  }
  const users = await getUsers();
  const user = users.find(u => u.username === username && u.password === password);
  if (user) {
    currentUser = user;
    if (remember) localStorage.setItem('family_vault_user', username);
    await Promise.all([loadFoldersFromCloud(), loadCalendarEvents(), loadRecipes(), loadUserProfiles()]);
    startAutoLocationTracking(); // ? start auto-tracking after login
    renderApp(); return;
  }
  showMessage('Invalid username or password', 'error');
};
const doSignup = async () => {
  const username = document.getElementById('signupUsername')?.value.trim();
  const phone = document.getElementById('signupPhone')?.value.trim();
  const password = document.getElementById('signupPassword')?.value.trim();
  const confirm = document.getElementById('signupConfirm')?.value.trim();
  const securityQuestion = document.getElementById('securityQuestion')?.value;
  const securityAnswer = document.getElementById('securityAnswerInput')?.value.trim();
  if (!username || username.length < 3) { showMessage('Username: min 3 characters', 'error'); return; }
  if (!phone || phone.length < 10) { showMessage('Valid phone number required', 'error'); return; }
  if (password.length < 6) { showMessage('Password: min 6 characters', 'error'); return; }
  if (password !== confirm) { showMessage('Passwords do not match', 'error'); return; }
  if (!securityQuestion) { showMessage('Please select a security question', 'error'); return; }
  if (!securityAnswer) { showMessage('Please enter a security answer', 'error'); return; }
  if (ADMINS.some(a => a.username === username)) { showMessage('Username not available', 'error'); return; }
  const users = await getUsers();
  if (users.find(u => u.username === username)) { showMessage('Username taken', 'error'); return; }
  if (users.find(u => u.phone === phone)) { showMessage('Phone already registered', 'error'); return; }
  const success = await addUser(username, phone, password, securityQuestion, securityAnswer);
  if (success) { showMessage('Account created! Please sign in.', 'success'); showSignupBack(); }
  else showMessage('Error creating account', 'error');
};
